<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colorchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body{
           background-color: #e9d5ff;
           margin: 200px;
        }
        h1{
            text-align: center;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color:#1e3a8a;
        }
        .message{
            text-align: center;
            color:#374151;
        }
        #colorname{
            text-align: center;
            padding: 10px;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 18px;
            color:white;
            font-size:18px;
            font-weight:bold;
            margin-top: 20px;
        }
        .btn{
            background:#e0f2fe;
            color:#2563eb;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            font-weight:bold;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }
        .btn:hover{
           transform:scale(1.05);
           transition:0.2s;
           background-color: white;
           color:#2563eb; ;
        }
        #copymessage{
            text-align: center;
            color: white;
        }
        #copyBtn{
            display: none;
        }

    </style>
</head>
<body>
    <div class="container text-center" id="exploringcolors">
          <h1>Explore More Colors...!</h1>
          <p class="message">Click ChangeColor</p>
    </div>
    <div class="container d-flex justify-content-center align-items-center">
         <button type="button" class="btn" onclick="changeColor()"  >change color</button>
    </div>
    <div class="container d-flex justify-content-center align-items-center">
    <p id="colorname"></p>
    <p id="colorname">
    <i class="bi bi-copy" id="copyBtn" onclick="copyColor()" style="cursor:pointer; font-size:22px; margin-left:8px;"></i>
    </p>
    </div>
    <p id="copymessage"></p>
    <script>
        let color="";
        function changeColor(){
            let rand = Math.floor(Math.random()*16777215);
            color = `#${rand.toString(16)}`;
            document.body.style.backgroundColor=color;
            document.getElementById("colorname").innerHTML= `Color:${color}`;
            document.getElementById("copyBtn").style.display = "inline-block";
            document.getElementById("exploringcolors").style.display = "none"
           
                }
        function copyColor(){
            navigator.clipboard.writeText(color);
            let message= document.getElementById("copymessage");
            message.innerHTML="copied!"
            setTimeout(function(){
             message.innerHTML = "";},1500);
        }
    </script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
